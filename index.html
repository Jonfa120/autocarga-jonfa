<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Carga Pro - By: Jonfa</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; --whatsapp: #25d366; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 2px; }
        .sub { text-align: center; font-size: 11px; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
        
        .input-group { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; text-align: center; }
        
        .option-card { background: white; border: 2px solid #eee; padding: 15px; border-radius: 12px; margin-bottom: 15px; position: relative; }
        .best { border-color: var(--success); background: #f0fff4; }
        .option-title { font-weight: bold; color: var(--primary); font-size: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .option-val { font-size: 18px; font-weight: bold; color: #333; line-height: 1.4; }
        .badge { background: var(--success); color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; }
        
        .btn-ws { width: 100%; background: var(--whatsapp); color: white; border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        
        .signature { text-align: center; margin-top: 30px; font-style: italic; color: #95a5a6; font-size: 13px; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Auto-Carga Pro</h2>
    <div class="sub">SELECTOR INTELIGENTE (Rango 26-34)</div>

    <div class="input-group">
        <label>Total de Bandejas</label>
        <input type="number" id="totalBnd" placeholder="Ej: 388" oninput="calcular()">
    </div>

    <div id="optionsContainer"></div>

    <div class="signature">By: Jonfa</div>
</div>

<script>
    function calcular() {
        const total = parseInt(document.getElementById('totalBnd').value);
        const container = document.getElementById('optionsContainer');
        const posiblesCarros = [9, 12, 15];
        
        container.innerHTML = "";
        if (!total || total <= 0) return;

        let encontradas = 0;

        posiblesCarros.forEach(n => {
            const prom = total / n;
            
            if (prom >= 26 && prom <= 34.5) {
                encontradas++;
                const bndBase = Math.floor(total / n);
                const residuo = total % n;
                
                const card = document.createElement('div');
                card.className = "option-card";
                if(residuo === 0) card.classList.add('best');

                let textoWS = `📋 *PLAN DE CARGA*\n\nUso de *${n} carros* para ${total} bandejas:\n`;
                let htmlVal = "";

                if (residuo === 0) {
                    htmlVal = `${n} carros de ${bndBase} bnd.`;
                    textoWS += `✅ ${n} carros de ${bndBase} bnd.`;
                } else {
                    htmlVal = `${residuo} carros de ${bndBase + 1} bnd.<br>${n - residuo} carros de ${bndBase} bnd.`;
                    textoWS += `✅ ${residuo} de ${bndBase + 1} bnd.\n✅ ${n - residuo} de ${bndBase} bnd.`;
                }
                
                textoWS += `\n\n_Promedio: ${prom.toFixed(2)} bnd/carro_`;

                card.innerHTML = `
                    <div class="option-title">
                        CARGAR EN ${n} CARROS ${residuo === 0 ? '<span class="badge">IDEAL</span>' : ''}
                    </div>
                    <div class="option-val">${htmlVal}</div>
                    <div style="font-size:11px; color:#666; margin: 5px 0;">Promedio: ${prom.toFixed(2)} bnd/carro</div>
                    <button class="btn-ws" onclick="enviarWS('${encodeURIComponent(textoWS)}')">
                        Enviar este Plan
                    </button>
                `;
                container.appendChild(card);
            }
        });

        if (encontradas === 0) {
            container.innerHTML = `<div style="color:#c0392b; text-align:center; font-weight:bold; padding: 20px;">⚠️ No hay opciones seguras (26-34 bnd) para esta cantidad.</div>`;
        }
    }

    function enviarWS(msg) {
        window.open("https://api.whatsapp.com/send?text=" + msg, '_blank');
    }
</script>

</body>
</html>
